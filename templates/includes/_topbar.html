<header class="topbar">
    <button class="sidebar-toggle" id="sidebarToggle" aria-label="Menu">
        <i data-lucide="menu" size="20"></i>
    </button>

    <form class="topbar__search" action="{% url 'core:home' %}" method="get">
        <i data-lucide="search" size="16"></i>
        <input type="text" name="search" placeholder="Search books or authors…"
               value="{{ search_query|default:'' }}">
    </form>

    <div class="topbar__actions">
        {% if user.is_authenticated %}
            <a href="{% url 'core:create_book' %}" class="btn btn-accent btn-sm">
                <i data-lucide="plus" size="16"></i> Add Book
            </a>
        {% else %}
            <a href="{% url 'login' %}" class="btn btn-ghost btn-sm">Sign in</a>
            <a href="{% url 'signup' %}" class="btn btn-accent btn-sm">Register</a>
        {% endif %}
    </div>
</header>
