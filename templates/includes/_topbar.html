<header class="topbar">
    <button class="sidebar-toggle" id="sidebarToggle" aria-label="Меню">
        <i data-lucide="menu" size="20"></i>
    </button>

    <form class="topbar__search" action="{% url 'core:home' %}" method="get">
        {% if active_genre %}
            <input type="hidden" name="genre" value="{{ active_genre }}">
        {% endif %}
        <i data-lucide="search" size="16"></i>
        <input type="text" name="search" placeholder="Пошук книг або авторів…"
               value="{{ search_query|default:'' }}">
    </form>

    <div class="topbar__actions">
        {% if user.is_authenticated %}
            <a href="{% url 'core:create_book' %}" class="btn btn-accent btn-sm">
                <i data-lucide="plus" size="16"></i> Додати книгу
            </a>
        {% else %}
            <a href="{% url 'login' %}" class="btn btn-ghost btn-sm">Увійти</a>
            <a href="{% url 'signup' %}" class="btn btn-accent btn-sm">Реєстрація</a>
        {% endif %}
    </div>
</header>
