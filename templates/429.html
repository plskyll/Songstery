{% extends 'base.html' %}

{% block title %}Too Many Requests — {{ SITE_NAME }}{% endblock %}

{% block content %}
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;
                min-height:60vh;padding:60px 36px;text-align:center;">
        <p style="font-family:var(--ff-display);font-size:80px;font-weight:600;
                  color:var(--clr-border);line-height:1;margin-bottom:16px;">429</p>
        <h1 style="font-family:var(--ff-display);font-size:26px;font-weight:600;
                   color:var(--clr-ink);margin-bottom:10px;">Too many requests</h1>
        <p style="font-size:var(--text-base);color:var(--clr-muted);max-width:360px;margin-bottom:32px;">
            You are sending requests too quickly. Please wait a moment and try again.
        </p>
        <a href="{% url 'core:home' %}" class="btn btn-accent">Back to catalog</a>
    </div>
{% endblock %}
